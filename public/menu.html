<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#10182a" />
    <meta name="description" content="Меню пляжно-ресторанного комплексу «ГорПляж»" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
    <title>ГорПляж — Меню</title>
  </head>
  <body class="menu-page-body">
    <main class="menu-page-shell">
      <section class="menu-page-surface">
        <header class="menu-page-header">
          <div class="menu-page-header-top">
            <a class="brand brand-with-logo" href="/">
              <span class="brand-mark brand-mark-image">
                <img src="/icons/Logo.png" alt="ГорПляж logo" />
              </span>
              <span>
                <strong>ГорПляж</strong>
                <small data-i18n="brandSubtitle">Beach · Restaurant · Events</small>
              </span>
            </a>
            <button id="languageToggle" class="lang-toggle" type="button" aria-label="Switch language">EN</button>
          </div>

          <div class="menu-page-header-content">
            <div>
              <h1 data-i18n="menuPageTitle">Меню ГорПляжу</h1>
              <p class="menu-page-description" data-i18n="menuPageDescription">
                Окрема сторінка з категоріями та зручним переглядом основних позицій, як у digital menu.
              </p>
            </div>
            <a class="text-link menu-back-link" href="/" data-i18n="menuBackHome">← На головну</a>
          </div>
        </header>

        <nav class="menu-category-nav" id="categoryNav" aria-label="Menu categories"></nav>

        <section class="menu-showcase-card">
          <div>
            <h2 id="featuredDishName">—</h2>
            <p id="featuredDishText" class="menu-page-description">—</p>
            <div class="menu-showcase-meta">
              <span class="menu-badge" id="featuredDishCategory">—</span>
              <strong id="featuredDishPrice">—</strong>
            </div>
          </div>
          <div class="menu-showcase-image">
            <img id="featuredDishImage" class="menu-showcase-image-media" alt="" hidden />
            <div id="featuredDishImageFallback" class="menu-showcase-image-fallback" aria-hidden="true">GP</div>
          </div>
        </section>

        <section class="menu-catalog" id="menuCatalog"></section>
        <div class="menu-page-footer-spacer" aria-hidden="true"></div>
      </section>
    </main>

    <button id="cartFab" class="menu-cart-fab" type="button" hidden>
      <span class="menu-cart-fab-icon">🧺</span>
      <span class="menu-cart-fab-copy">
        <strong data-i18n="cartButtonLabel">Моє замовлення</strong>
        <small id="cartFabSummary">0</small>
      </span>
      <span id="cartFabCount" class="menu-cart-fab-count">0</span>
    </button>

    <div id="cartDrawer" class="menu-cart-drawer" hidden>
      <div id="cartBackdrop" class="menu-cart-backdrop"></div>
      <section class="menu-cart-panel" aria-labelledby="cartTitle" aria-modal="true" role="dialog">
        <header class="menu-cart-head">
          <div>
            <p class="eyebrow" data-i18n="cartEyebrow">Кошик</p>
            <h2 id="cartTitle" data-i18n="cartTitle">Моє замовлення</h2>
          </div>
          <button id="cartCloseButton" class="icon-btn" type="button" aria-label="Close cart">✕</button>
        </header>

        <div id="cartItems" class="menu-cart-items"></div>

        <footer class="menu-cart-footer">
          <div class="menu-cart-total-row">
            <span data-i18n="cartTotalLabel">Разом</span>
            <strong id="cartTotalValue">0 ₴</strong>
          </div>
          <p id="cartHint" class="menu-cart-hint" data-i18n="cartHint">
            Додайте страви через плюсик — список залишиться у вашому браузері.
          </p>
          <div class="menu-cart-actions">
            <button id="cartCopyButton" class="btn btn-secondary" type="button" data-i18n="cartCopy">Скопіювати замовлення</button>
            <button id="cartClearButton" class="btn" type="button" data-i18n="cartClear">Очистити</button>
          </div>
        </footer>
      </section>
    </div>

    <script src="/menu.js" defer></script>
  </body>
</html>
