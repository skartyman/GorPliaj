<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#10182a" />
    <meta name="description" content="Меню пляжно-ресторанного комплексу «ГорПляж»" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
    <title>ГорПляж — Меню</title>
  </head>
  <body class="menu-page-body">
    <main class="menu-page-shell">
      <section class="menu-page-surface">
        <header class="menu-page-header">
          <a class="brand" href="/">
            <span class="brand-mark">GP</span>
            <span>
              <strong>ГорПляж</strong>
              <small data-i18n="brandSubtitle">Beach · Restaurant · Events</small>
            </span>
          </a>

          <div class="menu-page-controls">
            <a class="menu-search-btn" href="#menuCatalog" aria-label="Go to menu catalog">⌕</a>
            <div class="lang-switch" aria-label="Language switcher">
              <button class="lang-btn active" type="button" data-lang="uk" data-i18n="langUk">Українська</button>
              <button class="lang-btn" type="button" data-lang="en" data-i18n="langEn">Англійська</button>
            </div>
          </div>
        </header>

        <section class="menu-page-intro">
          <p class="eyebrow" data-i18n="menuPageKicker">Kitchen & bar</p>
          <div class="menu-page-intro-row">
            <div>
              <h1 data-i18n="menuPageTitle">Меню ГорПляжу</h1>
              <p class="menu-page-description" data-i18n="menuPageDescription">
                Окрема сторінка з категоріями та зручним переглядом основних позицій, як у digital menu.
              </p>
            </div>
            <a class="text-link menu-back-link" href="/" data-i18n="menuBackHome">← На головну</a>
          </div>
        </section>

        <nav class="menu-category-nav" id="categoryNav" aria-label="Menu categories"></nav>

        <section class="menu-showcase-card">
          <div>
            <p class="eyebrow" data-i18n="menuFeatureLabel">Рекомендація</p>
            <h2 id="featuredDishName">—</h2>
            <p id="featuredDishText" class="menu-page-description">—</p>
            <div class="menu-showcase-meta">
              <span class="menu-badge" id="featuredDishCategory">—</span>
              <strong id="featuredDishPrice">—</strong>
            </div>
          </div>
          <div class="menu-showcase-image" aria-hidden="true"></div>
        </section>

        <section class="menu-catalog" id="menuCatalog"></section>
      </section>
    </main>

    <script src="/menu.js" defer></script>
  </body>
</html>
