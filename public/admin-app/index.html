<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GorPliaj Admin</title>
    <meta name="theme-color" content="#5c3a21" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/admin-favicon-32.png?v=8" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/admin-favicon-192.png?v=8" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/admin-favicon-192.png?v=8" />
    <link rel="manifest" href="/admin.webmanifest?v=8" />
    <script type="module" crossorigin src="/admin/assets/index-DRt0ZUaA.js"></script>
    <link rel="stylesheet" crossorigin href="/admin/assets/index-3Md5YMh1.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        try {
          const cleanedKey = 'gorpliaj-admin-sw-cleaned-v2';
          const reloadedKey = 'gorpliaj-admin-sw-reloaded-v2';
          const hadController = Boolean(navigator.serviceWorker && navigator.serviceWorker.controller);

          if (sessionStorage.getItem(cleanedKey) === '1') {
            return;
          }
          sessionStorage.setItem(cleanedKey, '1');

          const cleanupTasks = [];
          const currentHref = window.location.href;

          if ('serviceWorker' in navigator) {
            cleanupTasks.push(
              navigator.serviceWorker.getRegistrations().then((registrations) => Promise.all(
                registrations
                  .filter((registration) => {
                    const scope = String(registration.scope || '');
                    return currentHref.startsWith(scope) || scope.includes('/admin');
                  })
                  .map((registration) => registration.unregister())
              ))
            );
          }

          if ('caches' in window) {
            cleanupTasks.push(
              caches.keys().then((keys) => Promise.all(
                keys
                  .filter((key) => key.startsWith('gorpliaj-'))
                  .map((key) => caches.delete(key))
              ))
            );
          }

          Promise.allSettled(cleanupTasks).then(() => {
            if (hadController && sessionStorage.getItem(reloadedKey) !== '1') {
              sessionStorage.setItem(reloadedKey, '1');
              window.location.reload();
            }
          });
        } catch (_) {}
      })();
    </script>
  </body>
</html>
