    <rect stroke-width="7.5" stroke="#a37a4f" fill="none" rx="5" height="54" width="334" y="358" x="43"></rect>
    <rect stroke-width="7" stroke="#a37a4f" fill="none" rx="5" height="50" width="324" y="308" x="48"></rect>
