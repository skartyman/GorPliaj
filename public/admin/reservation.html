<!doctype html>
<html lang="en">
<head>

  <title>Reservation Detail</title>
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body>
  <main class="admin-shell">
    <section class="admin-card">
      <header class="admin-header">
        <div>
          <h1 class="admin-title">Reservation detail</h1>
          <p class="admin-subtitle"><a class="small-link" href="/admin/reservations.html">← Back to reservations</a></p>

        <button id="logout-btn" class="secondary">Logout</button>

      <p class="error" id="error-message"></p>
      <div id="detail-content" class="detail-grid"></div>
