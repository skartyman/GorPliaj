<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#5d2e8c" />
    <meta name="description" content="Карта бронювання столів ГорПляж" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/css/booking.css" />
    <title>Бронювання столів — ГорПляж</title>
  </head>
  <body>
    <main class="booking-page">
      <header class="booking-header">
        <p class="eyebrow">ГорПляж</p>
        <h1>Бронювання столів</h1>
        <p class="subtitle">Оберіть столик на мапі, щоб переглянути його параметри.</p>
        <a class="back-link" href="/">← На головну</a>
      </header>

      <section class="booking-layout" aria-label="Схема майданчика та інформація про стіл">
        <article class="card">
          <h2>Мапа закладу</h2>
          <p id="loadingState" class="state state-loading" role="status">Завантаження карти…</p>
          <p id="errorState" class="state state-error hidden" role="alert"></p>
          <div id="bookingMap" class="booking-map hidden" aria-label="Мапа столів"></div>
        </article>

        <aside class="card info-panel" aria-live="polite">
          <h2>Обраний стіл</h2>
          <p id="tableInfoEmpty" class="state">Натисніть на стіл на мапі.</p>
          <dl id="tableInfoDetails" class="details hidden">
            <div><dt>Code</dt><dd id="tableCode">—</dd></div>
            <div><dt>Name</dt><dd id="tableName">—</dd></div>
            <div><dt>Seats</dt><dd id="tableSeats">—</dd></div>
            <div><dt>Deposit</dt><dd id="tableDeposit">—</dd></div>
            <div><dt>Zone</dt><dd id="tableZone">—</dd></div>
          </dl>
        </aside>
      </section>
    </main>

    <script src="/js/booking.js" defer></script>
  </body>
</html>
