# fly.toml app configuration file generated for gorpliaj on 2026-03-08T15:25:45Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'gorpliaj'
primary_region = 'fra'

[build]

[deploy]
  release_command = "/bin/sh -c 'PRISMA_SCHEMA_DISABLE_ADVISORY_LOCK=true npx prisma migrate deploy'"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 2
  processes = ['app']

  [[http_service.checks]]
    grace_period = '20s'
    interval = '15s'
    method = 'GET'
    path = '/healthz'
    protocol = 'http'
    timeout = '5s'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
